name: Weekly Newsletter Agent

on:
  schedule:
    # Every Tuesday at 9:00 AM UTC (good time for Canadian/US audience)
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      send_now:
        description: "Send immediately to subscribers (true) or save as draft (false)"
        required: false
        default: "false"

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    # Allow the job to commit the updated database back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENT_EMAIL: ${{ secrets.NEWSLETTER_RECIPIENT_EMAIL }}
        run: |
          SEND_FLAG=""
          if [ "${{ github.event.inputs.send_now }}" = "true" ]; then
            SEND_FLAG="--send"
          fi
          python -m newsletter.agent $SEND_FLAG

      # Commit the updated SQLite database back to the repo
      # This is how the dataset grows over time — the repo IS the database
      - name: Commit updated database
        run: |
          git config user.name "Newsletter Agent"
          git config user.email "agent@noreply.github.com"
          git add data/immigration.db
          git diff --staged --quiet || git commit -m "chore: update draw database [skip ci]"
          git push
